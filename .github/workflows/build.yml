name: Build executables

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: cover-review-windows.exe
            sep: ";"
          - os: ubuntu-latest
            artifact: cover-review-linux
            sep: ":"
          - os: macos-latest
            artifact: cover-review-macos
            sep: ":"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer l'application et PyInstaller
        run: pip install . pyinstaller

      - name: Construire l'exécutable
        run: >
          pyinstaller --onefile --name cover-review
          --add-data "cover_review/templates${{ matrix.sep }}cover_review/templates"
          --add-data "cover_review/static${{ matrix.sep }}cover_review/static"
          packaging/entry.py

      - name: Renommer le binaire
        shell: bash
        run: |
          mkdir out
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            mv dist/cover-review.exe "out/${{ matrix.artifact }}"
          else
            mv "dist/cover-review" "out/${{ matrix.artifact }}"
          fi

      - name: Vérifier que l'exécutable démarre
        if: runner.os != 'Windows'
        shell: bash
        run: |
          COVER_REVIEW_NO_BROWSER=1 COVER_REVIEW_PORT=5099 "./out/${{ matrix.artifact }}" &
          server_pid=$!
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:5099/ || true)
            if [[ "$code" == "200" ]]; then
              echo "Serveur OK"
              kill $server_pid
              exit 0
            fi
            sleep 1
          done
          echo "Le serveur n'a pas répondu"
          kill $server_pid || true
          exit 1

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: out/${{ matrix.artifact }}

      - name: Attacher le binaire à la release
        if: github.event_name == 'release'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "out/${{ matrix.artifact }}" --clobber
